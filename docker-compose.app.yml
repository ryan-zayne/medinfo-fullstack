services:
   # Backend API
   backend:
      build:
         context: .
         dockerfile: apps/backend/Dockerfile
      container_name: medinfo-backend
      restart: always
      ports:
         - "8000:8000"
      depends_on:
         # We can't depend on 'postgres' service here locally because it's in another file.
         # Instead, we assume the DB is running on the network.
         - migrations
      environment:
         NODE_ENV: production
         # Override connection strings to point to the standalone DB container
         DATABASE_URL_DEV: postgresql://postgres:postgres@medinfo-postgres:5432/medinfo
         DATABASE_URL_PROD: postgresql://postgres:postgres@medinfo-postgres:5432/medinfo
      env_file:
         - ./apps/backend/.env
      networks:
         - medinfo-network

   # Database Migrations
   migrations:
      build:
         context: .
         dockerfile: packages/db/Dockerfile
      container_name: medinfo-migrations
      environment:
         NODE_ENV: development
         DATABASE_URL_DEV: postgresql://postgres:postgres@medinfo-postgres:5432/medinfo
         DATABASE_URL_PROD: postgresql://postgres:postgres@medinfo-postgres:5432/medinfo
      env_file:
         - ./apps/backend/.env
      restart: "no"
      networks:
         - medinfo-network

networks:
   medinfo-network:
      external: true
      name: medinfo-global-network
