name: Lint and Type

on:
   pull_request:
   push:
      branches: [main, dev]

permissions:
   contents: read

jobs:
   lint-and-type:
      runs-on: ubuntu-latest
      strategy:
         matrix:
            node-version: [lts/*]
      steps:
         - name: Checkout code
           uses: actions/checkout@v6

         - name: Setup pnpm
           uses: pnpm/action-setup@v5
           with:
              version: 10.33.2

         - name: Setup Node.js
           uses: actions/setup-node@v6
           with:
              node-version: ${{ matrix.node-version }}
              cache: pnpm

         - name: Install dependencies
           run: pnpm install --frozen-lockfile

         - name: Run linters
           run: |
              pnpm lint:type-check
              pnpm lint:eslint:root
