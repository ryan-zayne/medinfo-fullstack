services:
   # PostgreSQL Database
   postgres:
      image: postgres:16-alpine
      container_name: medinfo-postgres
      restart: unless-stopped
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: postgres
         POSTGRES_DB: medinfo
      ports:
         - "5432:5432"
      volumes:
         - postgres_data:/var/lib/postgresql/data
      healthcheck:
         test: ["CMD-SHELL", "pg_isready -U postgres -d medinfo"]
         interval: 10s
         timeout: 5s
         retries: 5

   # Database Migrations
   migrations:
      build:
         context: .
         dockerfile: packages/db/Dockerfile
      container_name: medinfo-migrations
      depends_on:
         postgres:
            condition: service_healthy
      environment:
         DATABASE_URL_DEV: postgresql://postgres:postgres@postgres:5432/medinfo
         DATABASE_URL_PROD: postgresql://postgres:postgres@postgres:5432/medinfo
         NODE_ENV: development
      # One-shot container - exits after migration
      restart: "no"

   # Backend API Server
   backend:
      build:
         context: .
         dockerfile: apps/backend/Dockerfile
      container_name: medinfo-backend
      restart: unless-stopped
      depends_on:
         migrations:
            condition: service_completed_successfully
      ports:
         - "8000:8000"
      environment:
         NODE_ENV: production
         PORT: 8000
         DATABASE_URL_DEV: postgresql://postgres:postgres@postgres:5432/medinfo
         DATABASE_URL_PROD: postgresql://postgres:postgres@postgres:5432/medinfo
         # Add your other env vars here or use env_file
      env_file:
         - ./apps/backend/.env
      healthcheck:
         test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
         interval: 30s
         timeout: 3s
         start_period: 10s
         retries: 3

volumes:
   postgres_data:
