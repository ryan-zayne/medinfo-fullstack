services:
   postgres-db:
      image: postgres:18-alpine
      container_name: medinfo-postgres-db
      restart: unless-stopped
      env_file:
         - ./apps/backend/.env
      ports:
         - "5432:5432"
      volumes:
         - postgres_data:/var/lib/postgresql/data
      networks:
         - medinfo-network
      healthcheck:
         test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
         interval: 10s
         timeout: 5s
         retries: 3

   db-setup:
      build:
         context: .
         dockerfile: packages/db/Dockerfile
      container_name: medinfo-db-setup
      depends_on:
         postgres-db:
            condition: service_healthy
      env_file:
         - ./apps/backend/.env
      networks:
         - medinfo-network
      restart: "no"

   backend:
      build:
         context: .
         dockerfile: apps/backend/Dockerfile
      container_name: medinfo-backend
      restart: unless-stopped
      depends_on:
         db-setup:
            condition: service_completed_successfully
      networks:
         - medinfo-network
      ports:
         - "8000:8000"
      env_file:
         - ./apps/backend/.env
      healthcheck:
         test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
         interval: 30s
         timeout: 3s
         start_period: 10s
         retries: 3

volumes:
   postgres_data:

networks:
   medinfo-network:
